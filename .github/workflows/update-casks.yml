name: Update Casks

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-casks
  cancel-in-progress: true

jobs:
  update-casks:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Homebrew tap
        run: |
          brew tap ${{ github.repository }} "${{ github.workspace }}"

      - name: Run update script
        id: update
        shell: bash
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_GITHUB_API_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          UPDATED=()
          for CASK in Casks/*.rb; do
            CASK_NAME=$(basename "$CASK" .rb)
            echo "--- Checking $CASK_NAME ---"

            # Get current version from cask file
            CURRENT_VERSION=$(grep -E '^[[:space:]]*version "' "$CASK" | head -1 | sed 's/.*version "\(.*\)".*/\1/')
            echo "Current version: $CURRENT_VERSION"

            # Run brew livecheck against the local tap cask
            LIVECHECK_STDERR=$(mktemp)
            LIVECHECK=$(brew livecheck --cask "$CASK_NAME" 2>"$LIVECHECK_STDERR" || true)
            LIVECHECK_ERR=$(cat "$LIVECHECK_STDERR")
            rm -f "$LIVECHECK_STDERR"
            echo "Livecheck stdout: $LIVECHECK"
            [ -n "$LIVECHECK_ERR" ] && echo "Livecheck stderr: $LIVECHECK_ERR"

            if echo "$LIVECHECK_ERR" | grep -qi "error\|rate limit\|unable\|not found"; then
              echo "Warning: livecheck may have failed for $CASK_NAME: $LIVECHECK_ERR"
            fi

            # Extract new version: take everything after "==>" and get the first word
            if ! echo "$LIVECHECK" | grep -q "==>"; then
              echo "No update info for $CASK_NAME, skipping"
              continue
            fi
            NEW_VERSION=$(echo "$LIVECHECK" | grep '==' | sed 's/.*==>[[:space:]]*//' | awk '{print $1}' | sed $'s/\e\\[[0-9;]*m//g')

            if [ -z "$NEW_VERSION" ] || [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
              echo "No update needed for $CASK_NAME"
              continue
            fi

            echo "Updating $CASK_NAME: $CURRENT_VERSION -> $NEW_VERSION"

            # Safely escape version strings for sed (escape /, \, &)
            ESCAPED_CURRENT=$(echo "$CURRENT_VERSION" | sed 's/[/\&]/\\&/g')
            ESCAPED_NEW=$(echo "$NEW_VERSION" | sed 's/[/\&]/\\&/g')

            # Update version in cask file
            sed -i.bak "s/version \"$ESCAPED_CURRENT\"/version \"$ESCAPED_NEW\"/" "$CASK"
            rm -f "$CASK.bak"

            # Parse arch line(s) to extract arch names and values separately
            # May span multiple lines when a line ends with ','
            # e.g. arch arm: "arm64", intel: "x64"
            #      arch arm: "arm64"
            #      arch arm: "aarch64",
            #          intel: "x64"
            ARCH_LINE=$(awk '/^[[:space:]]*arch /{line=$0; while(/,$/){getline; line=line" "$0}; print line; exit}' "$CASK")
            echo "Arch line: $ARCH_LINE"

            ARCH_NAMES=()
            ARCH_VALUES=()
            if echo "$ARCH_LINE" | grep -qE 'arm:'; then
              ARM_ARCH=$(echo "$ARCH_LINE" | grep -oE 'arm: "[^"]*"' | sed 's/.*"\(.*\)"/\1/')
              ARCH_NAMES+=("arm")
              ARCH_VALUES+=("$ARM_ARCH")
              echo "ARM arch: '$ARM_ARCH'"
            fi
            if echo "$ARCH_LINE" | grep -qE 'intel:'; then
              INTEL_ARCH=$(echo "$ARCH_LINE" | grep -oE 'intel: "[^"]*"' | sed 's/.*"\(.*\)"/\1/')
              ARCH_NAMES+=("intel")
              ARCH_VALUES+=("$INTEL_ARCH")
              echo "INTEL arch: '$INTEL_ARCH'"
            fi

            # Get URL template
            URL_TEMPLATE=$(grep -E '^[[:space:]]*url "' "$CASK" | head -1 | sed 's/.*url "\(.*\)".*/\1/')
            echo "URL template: $URL_TEMPLATE"

            DOWNLOAD_SUCCESS=false
            for i in "${!ARCH_NAMES[@]}"; do
              ARCH_NAME="${ARCH_NAMES[$i]}"
              ARCH_VAL="${ARCH_VALUES[$i]}"

              # Construct download URL by replacing #{version} and #{arch}
              DOWNLOAD_URL=$(echo "$URL_TEMPLATE" | sed "s/#{version}/$ESCAPED_NEW/g; s/#{arch}/$ARCH_VAL/g")
              echo "Downloading ($ARCH_NAME): $DOWNLOAD_URL"

              TEMP_FILE="/tmp/$CASK_NAME-$ARCH_NAME.dmg"
              if curl -L -o "$TEMP_FILE" "$DOWNLOAD_URL" --connect-timeout 30 --max-time 120 --fail --silent --show-error; then
                if [ -f "$TEMP_FILE" ] && [ -s "$TEMP_FILE" ]; then
                  SHA256=$(shasum -a 256 "$TEMP_FILE" | awk '{print $1}')
                  echo "SHA256 ($ARCH_NAME): $SHA256"

                  # Update sha256 for this arch name (arm or intel)
                  sed -i.bak "/sha256 $ARCH_NAME:/s/\"[^\"]*\"/\"$SHA256\"/" "$CASK"
                  rm -f "$CASK.bak"
                  DOWNLOAD_SUCCESS=true
                else
                  echo "Warning: Downloaded file is empty for $CASK_NAME ($ARCH_NAME)"
                fi
              else
                echo "Warning: Failed to download $CASK_NAME ($ARCH_NAME) from $DOWNLOAD_URL"
              fi
              rm -f "$TEMP_FILE"
            done

            if [ "$DOWNLOAD_SUCCESS" = true ]; then
              UPDATED+=("$CASK_NAME $CURRENT_VERSION -> $NEW_VERSION")
            else
              echo "Skipping $CASK_NAME: No successful downloads"
              git checkout "$CASK"
            fi
          done

          # Output updated casks summary
          if [ ${#UPDATED[@]} -gt 0 ]; then
            printf -v UPDATED_STR '%s\n' "${UPDATED[@]}"
            echo "updated<<EOF" >> $GITHUB_OUTPUT
            echo "$UPDATED_STR" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.update.outputs.updated
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update casks"
          title: "Update Casks"
          body: |
            Automated cask updates:

            ```
            ${{ steps.update.outputs.updated }}
            ```
          branch: auto-update-casks
          delete-branch: true
